# Build the OCI image for the hecate-embed SERVICE and push to ghcr.io.
#
# Codeberg is canonical; this runs on the GitHub push-mirror (Codeberg has
# Forgejo Actions disabled per the migration pattern). Triggered on push to
# main and on tag pushes. The build compiles the real fastembed/ONNX NIF and
# bakes the model into the image, so it is heavier than a pure-Erlang build.
name: build-and-push

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/hecate-social/hecate-embed:latest
            ghcr.io/hecate-social/hecate-embed:${{ steps.tag.outputs.tag }}
